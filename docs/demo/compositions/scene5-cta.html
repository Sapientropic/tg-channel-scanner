<template id="scene5-template">
  <div data-composition-id="scene5" data-width="1920" data-height="1080">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=Press+Start+2P&display=swap');

      #scene5 {
        background: oklch(0.10 0.01 75);
        overflow: hidden;
        position: relative;
      }
      .ambient-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(oklch(0.55 0.16 155 / 0.025) 1px, transparent 1px),
          linear-gradient(90deg, oklch(0.55 0.16 155 / 0.025) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      .glow-orb {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(circle, oklch(0.55 0.12 155 / 0.10) 0%, transparent 65%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .scene-content {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        padding: 80px 120px;
        gap: 40px;
        box-sizing: border-box;
        position: relative;
        z-index: 2;
      }
      .tagline {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 88px;
        font-weight: 700;
        color: oklch(0.95 0.01 75);
        text-align: center;
        line-height: 1.2;
        letter-spacing: 0;
      }
      .tagline .accent {
        color: oklch(0.55 0.16 155);
      }
      .url-line {
        font-family: 'JetBrains Mono', monospace;
        font-size: 44px;
        color: oklch(0.55 0.16 155);
        text-align: center;
        line-height: 1.5;
        letter-spacing: 0;
      }
      .cursor-cta {
        display: inline-block;
        width: 22px;
        height: 50px;
        background: oklch(0.55 0.16 155);
        vertical-align: text-bottom;
        border-radius: 1px;
      }
      .footer-line {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 28px;
        font-weight: 500;
        color: oklch(0.50 0.01 75);
        text-align: center;
        letter-spacing: 0.02em;
      }
      .cta-particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: oklch(0.55 0.16 155 / 0.3);
      }
      .pixel-logo {
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 64px;
        font-weight: 400;
        color: oklch(0.55 0.16 155);
        text-align: center;
        letter-spacing: 0.04em;
        line-height: 1.6;
        text-transform: uppercase;
        text-shadow:
          3px 3px 0 oklch(0.30 0.10 155),
          6px 6px 0 oklch(0.20 0.06 155),
          0 0 50px oklch(0.55 0.16 155 / 0.20);
        margin-top: 20px;
      }
    </style>

    <div class="ambient-grid"></div>
    <div class="glow-orb" id="glow-orb"></div>
    <div class="cta-particles" id="particles"></div>

    <div class="scene-content">
      <div class="tagline" id="tagline-line1" style="opacity:0">Open source.</div>
      <div class="tagline" id="tagline-line2" style="opacity:0"><span class="accent">Self-hosted.</span></div>
      <div class="tagline" id="tagline-line3" style="opacity:0">Your data stays yours.</div>
      <div class="url-line" id="url-line" style="opacity:0">
        <span id="typed-url"></span><span class="cursor-cta" id="url-cursor"></span>
      </div>
      <div class="footer-line" id="footer-line" style="opacity:0">Star us on GitHub</div>
      <div class="pixel-logo" id="pixel-logo" style="opacity:0">TG CHANNEL<br>SCANNER</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // Seeded PRNG for deterministic particles
      var seed = 42;
      function seededRandom() {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      }

      // Create particles
      var particleContainer = document.getElementById("particles");
      for (var p = 0; p < 20; p++) {
        var el = document.createElement("div");
        el.className = "particle";
        el.style.left = (seededRandom() * 100) + "%";
        el.style.top = (seededRandom() * 100) + "%";
        el.style.opacity = 0;
        particleContainer.appendChild(el);
      }

      // Glow entrance
      tl.fromTo("#glow-orb", { opacity: 0, scale: 0.4 }, { opacity: 1, scale: 1, duration: 1.0, ease: "power2.out", overwrite: "auto" }, 0);

      // Tagline lines stagger in
      tl.fromTo("#tagline-line1", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out", overwrite: "auto" }, 0.3);
      tl.fromTo("#tagline-line2", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" }, 0.6);
      tl.fromTo("#tagline-line3", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out", overwrite: "auto" }, 0.9);

      // URL typing
      var URL = "github.com/Sapientropic/tg-channel-scanner";
      var typedUrl = document.getElementById("typed-url");
      var urlCursor = document.getElementById("url-cursor");

      var typeStart = 3.5;
      var typeDuration = 2.2;

      tl.fromTo("#url-line", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.3 }, typeStart - 0.3);

      // Cursor blink during typing
      tl.to("#url-cursor", { opacity: 0, duration: 0.12, yoyo: true, repeat: 32, ease: "steps(1)", overwrite: "auto" }, typeStart);

      for (var i = 0; i < URL.length; i++) {
        (function (idx) {
          tl.call(
            function () {
              typedUrl.textContent = URL.substring(0, idx + 1);
            },
            [],
            typeStart + (idx / URL.length) * typeDuration
          );
        })(i);
      }

      // Hide cursor after typing
      tl.to("#url-cursor", { opacity: 0, duration: 0.01 }, typeStart + typeDuration + 0.1);

      // Footer line
      tl.fromTo("#footer-line", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, typeStart + typeDuration + 0.4);

      // Ambient motion: glow breathing + particles
      var ambientStart = typeStart + typeDuration + 0.8;
      tl.to("#glow-orb", { scale: 1.12, duration: 2.0, ease: "sine.inOut", yoyo: true, repeat: 4 }, ambientStart);

      // Pixel logo entrance at ~9s
      tl.fromTo("#pixel-logo", { opacity: 0, y: 24, scale: 0.94 }, { opacity: 1, y: 0, scale: 1, duration: 0.56, ease: "power3.out" }, 9.0);

      // Particles fade in and float
      document.querySelectorAll(".particle").forEach(function (pt, idx) {
        var delay = ambientStart + (idx * 0.15);
        tl.fromTo(pt, { opacity: 0 }, { opacity: seededRandom() * 0.5 + 0.2, duration: 0.8 }, delay);
        tl.to(pt, { y: -(seededRandom() * 80 + 20), x: (seededRandom() - 0.5) * 40, duration: 4 + seededRandom() * 4, ease: "sine.inOut", yoyo: true, repeat: 2 }, delay + 0.2);
      });

      // Subtle tagline float
      tl.to("#tagline-line1", { y: -6, duration: 2.5, ease: "sine.inOut", yoyo: true, repeat: 2 }, ambientStart);
      tl.to("#tagline-line3", { y: -6, duration: 2.8, ease: "sine.inOut", yoyo: true, repeat: 2 }, ambientStart + 0.3);

      // Fade before the shortened 49s master ends, avoiding the looping tail in the soundtrack.
      tl.to(".scene-content", { opacity: 0, duration: 1.2, ease: "power2.in" }, 12.2);
      tl.to("#glow-orb", { opacity: 0, duration: 1.2, ease: "power2.in" }, 12.2);
      tl.to(".ambient-grid", { opacity: 0, duration: 1.2, ease: "power2.in" }, 12.2);
      tl.to(".particle", { opacity: 0, duration: 0.9, ease: "power2.in" }, 12.2);
      // Hard kill after fade
      tl.set(".scene-content", { opacity: 0, visibility: "hidden" }, 13.6);
      tl.set("#glow-orb", { opacity: 0, visibility: "hidden" }, 13.6);
      tl.set(".ambient-grid", { opacity: 0, visibility: "hidden" }, 13.6);
      tl.set(".particle", { opacity: 0, visibility: "hidden" }, 13.6);

      window.__timelines["scene5"] = tl;
    </script>
  </div>
</template>
