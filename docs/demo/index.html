<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: oklch(0.10 0.01 75);
      }
      .scene-clip {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        opacity: 0;
      }
      .scene-clip:first-child {
        opacity: 1;
      }
      #el-pixel {
        z-index: 50;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="50"
      data-width="1920"
      data-height="1080"
    >
      <!-- Scene 1: Title/Hook (0-5s) -->
      <div
        id="el-s1"
        class="scene-clip clip"
        data-composition-id="scene1"
        data-composition-src="compositions/scene1-title.html"
        data-start="0"
        data-duration="5.4"
        data-track-index="1"
      ></div>

      <!-- Scene 2: Terminal Demo (5-14s) -->
      <div
        id="el-s2"
        class="scene-clip clip"
        data-composition-id="scene2"
        data-composition-src="compositions/scene2-terminal.html"
        data-start="5"
        data-duration="9.4"
        data-track-index="2"
      ></div>

      <!-- Scene 3: Report Reveal (14-17s) -->
      <div
        id="el-s3"
        class="scene-clip clip"
        data-composition-id="scene3"
        data-composition-src="compositions/scene3-report-reveal.html"
        data-start="14"
        data-duration="3.4"
        data-track-index="1"
      ></div>

      <!-- Scene 4: Interaction Showcase (17-33s) -->
      <div
        id="el-s4"
        class="scene-clip clip"
        data-composition-id="scene4"
        data-composition-src="compositions/scene4-interactions.html"
        data-start="17"
        data-duration="16.4"
        data-track-index="2"
      ></div>

      <!-- Scene 5: CTA + Logo (33-50s) -->
      <div
        id="el-s5"
        class="scene-clip clip"
        data-composition-id="scene5"
        data-composition-src="compositions/scene5-cta.html"
        data-start="33"
        data-duration="17"
        data-track-index="1"
      ></div>

      <!-- Pixel animation inserted at 14s via FFmpeg concat, not HTML overlay -->
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var cf = 0.4; // crossfade duration

      // Scene 1 -> Scene 2 crossfade at 5s
      tl.to("#el-s1", { opacity: 0, duration: cf, ease: "power2.inOut" }, 5.0);
      tl.fromTo("#el-s2", { opacity: 0 }, { opacity: 1, duration: cf, ease: "power2.inOut" }, 5.0);

      // Scene 2 -> Scene 3 crossfade at 14s
      tl.to("#el-s2", { opacity: 0, duration: cf, ease: "power2.inOut" }, 14.0);
      tl.fromTo("#el-s3", { opacity: 0 }, { opacity: 1, duration: cf, ease: "power2.inOut" }, 14.0);

      // Scene 3 -> Scene 4 crossfade at 17s
      tl.to("#el-s3", { opacity: 0, duration: cf, ease: "power2.inOut" }, 17.0);
      tl.fromTo("#el-s4", { opacity: 0 }, { opacity: 1, duration: cf, ease: "power2.inOut" }, 17.0);

      // Scene 4 -> Scene 5 crossfade at 33s
      tl.to("#el-s4", { opacity: 0, duration: cf, ease: "power2.inOut" }, 33.0);
      tl.fromTo("#el-s5", { opacity: 0 }, { opacity: 1, duration: cf, ease: "power2.inOut" }, 33.0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
