name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-llm.txt -r requirements-desktop.txt -r requirements-dev.txt

      - name: Compile Python scripts
        run: |
          python -m py_compile scripts/scan.py scripts/summarize.py scripts/media_ocr.py scripts/ocr_media.py scripts/report.py scripts/report_diagnostics.py scripts/report_html_links.py scripts/daily_report.py scripts/doctor.py scripts/delivery.py scripts/monitor_state.py scripts/monitor.py scripts/monitor_runner.py scripts/monitor_execution.py scripts/monitor_manifest.py scripts/dashboard_projection.py scripts/dashboard_opportunities.py scripts/dashboard_setup.py scripts/desk_server_selection.py scripts/desk_http_security.py scripts/desk_profile_routes.py scripts/desk_bot_gateway_background.py scripts/desk_secret_settings.py scripts/desk_delivery_settings.py scripts/desk_telegram_login.py scripts/desk_source_registry.py scripts/desk_source_access.py scripts/desk_source_assistant.py scripts/dashboard_server.py

      - name: Run Ruff
        run: |
          python -m ruff check .

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Check shell scripts
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          bash -n setup.sh scripts/scan.sh tgcs signal-desk "Signal Desk.command"

      - name: Guard POSIX launcher line endings
        if: runner.os == 'Windows'
        shell: python
        run: |
          from pathlib import Path
          import subprocess
          tracked = subprocess.check_output(
              ["git", "ls-files", "*.sh", "tgcs", "signal-desk", "Signal Desk.command"],
              text=True,
          ).splitlines()
          paths = sorted(set(tracked))
          bad = [path for path in paths if b"\r\n" in Path(path).read_bytes()]
          if bad:
              raise SystemExit("POSIX launchers must stay LF-only: " + ", ".join(bad))

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Test dashboard
        working-directory: dashboard
        run: npm test -- --run

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build
