name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-llm.txt -r requirements-dev.txt

      - name: Compile Python scripts
        run: |
          python -m py_compile scripts/scan.py scripts/summarize.py scripts/media_ocr.py scripts/ocr_media.py scripts/report.py scripts/daily_report.py

      - name: Run Ruff
        run: |
          python -m ruff check .

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Check shell scripts
        if: runner.os == 'Linux'
        run: |
          bash -n setup.sh scripts/scan.sh
